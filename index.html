<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yash Cafe - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #c9b79c; /* Exact beige background */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        /* Coffee Illustration */
        .illustration {
            width: 180px;
            height: 180px;
            margin-bottom: 20px;
        }

        .illustration img {
            width: 100%;
            height: auto;
        }

        /* Headings */
        .welcome-text {
            font-size: 28px;
            font-style: italic;
            color: #2d2d2d;
            margin-bottom: 8px;
            font-family: cursive; /* Matches reference script font */
        }

        .cafe-name {
            font-size: 36px;
            font-weight: 900;
            color: #000;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        /* Input Fields */
        .input-field {
            width: 100%;
            max-width: 320px;
            height: 60px;
            border: 2px solid #000;
            border-radius: 30px;
            background-color: #fff;
            padding: 0 20px;
            font-size: 18px;
            color: #4a4a4a;
            margin-bottom: 20px;
        }

        .input-field::placeholder {
            color: #7a7a7a;
        }

        /* Remember Me */
        .remember-container {
            width: 100%;
            max-width: 320px;
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }

        .remember-checkbox {
            width: 20px;
            height: 20px;
            border-radius: 5px;
            border: 2px solid #000;
            background-color: #fff;
            margin-right: 10px;
            cursor: pointer;
        }

        .remember-text {
            font-size: 16px;
            color: #2d2d2d;
        }

        /* Buttons */
        .button-container {
            width: 100%;
            max-width: 320px;
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }

        .action-button {
            flex: 1;
            height: 50px;
            border: 2px solid #000;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .signup-btn {
            background: #fff;
            color: #d62828;
        }

        .login-btn {
            background: #fff;
            color: #2d2d2d;
        }

        /* Forgot Password */
        .forgot-link-container {
            font-size: 16px;
            color: #2d2d2d;
        }

        .forgot-link {
            color: #006400;
            text-decoration: underline;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Coffee Illustration (use same image as menu page) -->
    <div class="illustration">
        <img src="coffee-header.png" alt="Cup of coffee with heart latte art">
    </div>

    <!-- Headings -->
    <div class="welcome-text">Welcome to</div>
    <div class="cafe-name">YASH CAFE!</div>

    <!-- Inputs -->
    <input type="email" class="input-field" placeholder="Email" id="email">
    <input type="password" class="input-field" placeholder="Password" id="password">

    <!-- Remember Me -->
    <div class="remember-container">
        <div class="remember-checkbox" id="rememberCheck"></div>
        <div class="remember-text">Remember Me</div>
    </div>

    <!-- Buttons (navigate to menu page) -->
    <div class="button-container">
        <button class="action-button signup-btn" onclick="window.location.href='menu.html'">Sign Up</button>
        <button class="action-button login-btn" onclick="window.location.href='menu.html'">Log In</button>
    </div>

    <!-- Forgot Password -->
    <div class="forgot-link-container">
        Forgot Password? <span class="forgot-link">Click Here</span>
    </div>

    <script>
        // Toggle checkbox visual
        document.getElementById('rememberCheck').addEventListener('click', function() {
            this.style.backgroundColor = this.style.backgroundColor === '#000' ? '#fff' : '#000';
        });
    </script>
</body>
</html>
